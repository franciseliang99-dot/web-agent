<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>web-agent observer</title>
<style>
  body { margin: 0; padding: 0; width: 480px; height: 640px;
         font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .topbar { display: flex; align-items: center; justify-content: space-between;
            padding: 6px 10px; background: #1976d2; color: #fff; }
  .topbar .title { font-size: 14px; font-weight: 600; }
  .topbar button { background: rgba(255,255,255,0.2); color: #fff; border: 0;
                   padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
  .topbar button:hover { background: rgba(255,255,255,0.3); }
  .frame-wrap { width: 100%; height: calc(100% - 32px); }
  iframe { width: 100%; height: 100%; border: 0; }
  .err { padding: 12px; color: #d32f2f; font-size: 13px; line-height: 1.5; }
  .err code { background: #f5f5f5; padding: 1px 5px; border-radius: 2px; }
</style>
</head>
<body>
<div class="topbar">
  <span class="title">web-agent observer</span>
  <button id="open-tab">↗ Open in tab</button>
</div>
<div class="frame-wrap">
  <iframe id="replay-frame"
          src="http://localhost:8000/index.html"
          sandbox="allow-same-origin allow-scripts allow-popups"></iframe>
</div>
<script src="popup.js"></script>
</body>
</html>
