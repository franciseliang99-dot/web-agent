name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps (with openai extra for full type coverage)
        run: uv sync --all-extras

      - name: ruff check
        run: uv run ruff check src/ tests/

      - name: mypy strict
        run: uv run mypy src/web_agent

      - name: pytest (235 unit + 2 smoke skip)
        run: uv run pytest -q
