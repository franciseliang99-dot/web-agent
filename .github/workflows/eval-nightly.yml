# V0.26.3: nightly eval workflow stub.
#
# 默认 if: false 防意外烧 token. maintainer 手动启用步骤:
# 1. 在 repo Settings → Secrets 加 ANTHROPIC_API_KEY (+ 可选 OPENAI_API_KEY)
# 2. 改 if: false → if: true (或 schedule: cron: '0 2 * * *' 每天 02:00 UTC 跑)
# 3. 验 workflow 单次跑成本 ≤ $5 (V0.26 plan E 节估算 single baseline run ~$1.5-3.6)
#
# Workflow 输出 data/eval/<run_id>.json + markdown 报告到 GitHub Actions step summary.
# baseline 数据决定 V0.27 凭证 vault 按 provider 分级 + V0.28 无人值守模式开权限边界.

name: eval-nightly

on:
  schedule:
    # cron 默认禁; maintainer 启用时改成 '0 2 * * *' 每天 02:00 UTC 跑
    - cron: '0 0 31 2 *'  # 永不触发 (2 月 31 日不存在)
  workflow_dispatch:  # 手动触发也可

jobs:
  eval:
    if: false  # V0.26.3 默认禁; maintainer 启用改 true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install web-agent + Playwright chromium
        run: |
          uv sync --extra openai
          uv run playwright install chromium

      - name: Run eval (cassette mode by default)
        env:
          WEB_AGENT_RUN_EVAL: "1"
          # WEB_AGENT_EVAL_REAL: "1"  # 启用真 LLM (烧 token, 仅 maintainer baseline)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run web-agent-eval --corpus all --providers anthropic --output data/eval/

      - name: Upload eval JSON to artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ github.run_id }}
          path: data/eval/*.json
          retention-days: 90
